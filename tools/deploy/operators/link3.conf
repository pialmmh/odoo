# Link3 — Orchestrix-v2 deployment config
# Server connection resolved from shared SSH inventory:
#   /home/mustafa/telcobright-projects/routesphere/routesphere-core/tools/ssh-automation/servers/<inventory_operator>/

[dev]
inventory_operator = link3
server             = link3-1
description        = Link3 Orchestrix Dev

pg_host            = 127.0.0.1
pg_port            = 5433
pg_admin_db        = postgres
pg_user            = postgres
pg_password_env    = ORCHESTRIX_PG_PASSWORD
odoo_db_name       = odoo_link3

odoo_home          = /opt/orchestrix/odoo-19
odoo_service       = orchestrix-odoo
odoo_http_port     = 7170

seed_app           = odoo
seed_version       = v19
seed_tenant        = link3

erp_api_home       = /opt/orchestrix/erp-api
erp_api_service    = orchestrix-erp-api
erp_api_http_port  = 7180

ui_nginx_root      = /var/www/orchestrix
ui_service         = nginx

components_default = odoo,erp-api,ui

