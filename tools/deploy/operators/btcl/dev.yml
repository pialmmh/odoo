# BTCL — Dev profile (local Odoo + remote Postgres)
#
# Profile model: local codebase + remote Postgres on the overlay network
# (10.10.0.0/16, WireGuard-tunneled). Odoo runs natively, Plane API as docker
# containers, Plane web via pnpm/turbo. Plane shares the same DB as Odoo.
#
# Server connection (only when --local is NOT passed) resolves from:
#   /home/mustafa/telcobright-projects/routesphere/routesphere-core/tools/ssh-automation/servers/<inventory_operator>/

inventory_operator: btcl
server: dell-sms-master
description: BTCL Orchestrix Dev — local Odoo+Plane against remote Postgres

# ── Postgres (shared catalog DB; same as Odoo) ──
