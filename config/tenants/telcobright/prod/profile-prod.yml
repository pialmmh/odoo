# Telcobright Prod Profile Configuration
# Production environment settings for Telcobright tenant

platform:
  tenant:
    name: "Telcobright ISP"
    slug: "telcobright"
    odoo-partner-id: 1
    environment: "production"

  billing:
    api-key: "telcobright"
    api-secret: "CHANGE_ME"
    currency: "BDT"
    timezone: "Asia/Dhaka"
    locale: "en_BD"
    test-clock-enabled: false

  services:
    odoo:
      url: "http://odoo-prod:7169"
      db: "odoo"
      username: "admin"
      password: "CHANGE_ME"
    killbill:
      url: "http://killbill-prod:18080"
      username: "admin"
      password: "CHANGE_ME"
    keycloak:
      url: "http://keycloak-prod:7104"
      realm: "telcobright"
      client-id: "platform-api"
      client-secret: "CHANGE_ME"
    kafka:
      bootstrap-servers: "kafka-prod:9092"
    apisix:
      url: "http://apisix-prod:9081"
      admin-url: "http://apisix-prod:9180"
      admin-key: "CHANGE_ME"

  kafka:
    topics:
      invoice-created: "kb.invoice.created"
      payment-success: "kb.payment.success"
      subscription-created: "kb.subscription.created"
      subscription-cancelled: "kb.subscription.cancelled"
      subscription-changed: "kb.subscription.changed"
      overdue-state: "kb.overdue.state"
      journal-entry: "odoo.journal.entry"
      package-provisioned: "rtc.package.provisioned"
      package-deprovisioned: "rtc.package.deprovisioned"
      notifications: "platform.notifications"
      audit: "platform.audit"

  overdue:
    warning-days: 7
    suspend-days: 14
    disconnect-days: 30

  accounting:
    vat-percent: 15.0
    ait-percent: 10.0
    accounts:
      receivable: "1200"
      revenue: "4000"
      bank: "1014"
      cash: "1010"
      mobile-money: "1015"
      vat-payable: "2200"
      ait-payable: "2201"

  rtc-manager:
    enabled: true
    base-url: "http://rtc-manager-prod:8080"
    tenant-endpoint: "/api/v1/tenant/telcobright"
    timeout: "30s"

  monitoring:
    metrics:
      enabled: true
    health:
      enabled: true
    logging:
      level: "WARN"
      format: "json"
      file-path: "/var/log/platform/telcobright-prod.log"
