# BTCL Dev Profile Configuration
# Development environment settings for BTCL tenant

platform:
  tenant:
    name: "BTCL"
    slug: "btcl"
    odoo-partner-id: 8
    environment: "development"

  # ========================================
  # Branding & Login Page
  # ========================================
  branding:
    login-title: "BTCL Service Portal"
    login-subtitle: "Bangladesh Telecommunications Company Limited"
    app-name: "BTCL Portal"
    app-short-name: "BTCL"
    theme: "green"
    logo-url: ""

  # ========================================
  # Billing Engine Configuration
  # ========================================
  billing:
    api-key: "btcl"
    api-secret: "btcl-secret"
    currency: "BDT"
    timezone: "Asia/Dhaka"
    locale: "en_BD"
    # Test clock enabled in dev for time-travel testing
    test-clock-enabled: true

  # ========================================
  # Service Endpoints
  # ========================================
  services:
    odoo:
      url: "http://localhost:7169"
      db: "odoo"
      username: "admin"
      password: "admin"
    killbill:
      url: "http://localhost:18080"
      username: "admin"
      password: "password"
    keycloak:
      url: "http://localhost:7104"
      realm: "telcobright"
      client-id: "platform-api"
      client-secret: "tde2klJ3vsgG5wYprw8IHHP9xo7df8V9"
    kafka:
      bootstrap-servers: "localhost:9092"
    apisix:
      url: "http://localhost:9081"
      admin-url: "http://localhost:9180"
      admin-key: "telcobright-apisix-admin-key"

  # ========================================
  # Kafka Topics
  # ========================================
  kafka:
    topics:
      invoice-created: "kb.invoice.created"
      payment-success: "kb.payment.success"
      subscription-created: "kb.subscription.created"
      subscription-cancelled: "kb.subscription.cancelled"
      subscription-changed: "kb.subscription.changed"
      overdue-state: "kb.overdue.state"
      journal-entry: "odoo.journal.entry"
      package-provisioned: "rtc.package.provisioned"
      package-deprovisioned: "rtc.package.deprovisioned"
      notifications: "platform.notifications"
      audit: "platform.audit"

  # ========================================
  # Overdue / Dunning Policy
  # ========================================
  overdue:
    warning-days: 7
    suspend-days: 14
    disconnect-days: 30

  # ========================================
  # Accounting Configuration
  # ========================================
  accounting:
    # Tax rates for BTCL
    vat-percent: 15.0
    ait-percent: 10.0
    # Odoo account codes
    accounts:
      receivable: "1200"
      revenue: "4000"
      bank: "1014"
      cash: "1010"
      mobile-money: "1015"
      vat-payable: "2200"
      ait-payable: "2201"

  # ========================================
  # RTC-Manager Integration
  # ========================================
  rtc-manager:
    enabled: false  # Not yet wired
    base-url: "http://localhost:8080"
    tenant-endpoint: "/api/v1/tenant/btcl"
    timeout: "30s"

  # ========================================
  # Monitoring
  # ========================================
  monitoring:
    metrics:
      enabled: true
    health:
      enabled: true
    logging:
      level: "DEBUG"
      format: "json"
      file-path: "/var/log/platform/btcl-dev.log"
