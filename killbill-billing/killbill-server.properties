#
# Telcobright Kill Bill Configuration
# Port: 18080
#

# Database config — PostgreSQL (same instance as Odoo, port 5433)
org.killbill.dao.url=jdbc:postgresql://127.0.0.1:5433/killbill
org.killbill.dao.user=mustafa
org.killbill.dao.password=mustafa
org.killbill.dao.logLevel=INFO

# OSGI plugin database config
org.killbill.billing.osgi.dao.url=jdbc:postgresql://127.0.0.1:5433/killbill
org.killbill.billing.osgi.dao.user=mustafa
org.killbill.billing.osgi.dao.password=mustafa

# Multi-tenant mode
org.killbill.server.multitenant=true

# Server base URL (used for callbacks, etc.)
org.killbill.server.baseUrl=http://127.0.0.1:18080

# Catalog - will be uploaded per tenant via API
# org.killbill.catalog.uri=

# Notification queue config
org.killbill.notificationq.main.sleep=500
org.killbill.notificationq.main.claimed=1
org.killbill.notificationq.main.queue.mode=STICKY_POLLING
org.killbill.notificationq.main.notification.nbThreads=2

# Bus config
org.killbill.persistent.bus.external.queue.mode=STICKY_EVENTS
org.killbill.persistent.bus.external.inMemory=true
org.killbill.persistent.bus.main.queue.mode=STICKY_EVENTS
org.killbill.persistent.bus.main.claimed=1
org.killbill.persistent.bus.main.nbThreads=2
org.killbill.persistent.bus.main.sleep=0
org.killbill.persistent.bus.main.queue.capacity=5000

# Tenant broadcast polling
org.killbill.tenant.broadcast.rate=5s

# JRuby for plugins
org.killbill.jruby.context.scope=THREADSAFE

# Gzip
org.killbill.server.http.gzip=true

# Test mode OFF for production-like behavior
org.killbill.server.test.mode=true

# Payment retry days
org.killbill.payment.retry.days=1,3,7

# Invoice safety bounds
org.killbill.invoice.sanitySafetyBoundEnabled=true
org.killbill.invoice.maxDailyNumberOfItemsSafetyBound=200

# Payment timeout
org.killbill.payment.plugin.timeout=30s
