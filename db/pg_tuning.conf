# PostgreSQL tuning for Odoo + Kill Bill + Document Storage
# Place in /etc/postgresql/16/main/conf.d/ or include from postgresql.conf
#
# Three databases on this instance:
#   odoo_billing (Odoo), killbill (Kill Bill), odoo_documents (doc binary)

max_connections = 100
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB
wal_buffers = 4MB
checkpoint_completion_target = 0.7
random_page_cost = 1.1
