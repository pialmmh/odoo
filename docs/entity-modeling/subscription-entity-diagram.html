// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

const svg = document.getElementById('diagram');
const svgNS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, parent = svg) {
  const e = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

function textEl(x, y, text, attrs = {}, parent = svg) {
  const t = el('text', { x, y, ...attrs }, parent);
  t.textContent = text;
  return t;
}

// Draw service boundaries

  const g = el('g', { class: 'service' });
  el('rect', {
    x: svc.x, y: svc.y, width: svc.width, height: svc.height,
    rx: 12, fill: svc.color, stroke: svc.borderColor, 'stroke-width': 2, opacity: 0.7,
  }, g);
  textEl(svc.x + 16, svc.y + 26, svc.label, {
    fill: svc.textColor, 'font-size': 18, 'font-weight': 700,
  }, g);
  textEl(svc.x + 16, svc.y + 44, svc.subtitle, {
    fill: svc.textColor, 'font-size': 11, opacity: 0.7,
  }, g);
}

// Entity bounding boxes for relationship lines
const entityBounds = {};

// Draw entities
for (const ent of ENTITIES) {
  const { width, headerH, rowH, padding, radius } = ENTITY_STYLE;
  const h = headerH + ent.fields.length * rowH + padding;
  const g = el('g', { class: 'entity', 'data-id': ent.id });

  // Background
  el('rect', {
    x: ent.x, y: ent.y, width, height: h, rx: radius,
    fill: '#1a1c28', stroke: '#444', 'stroke-width': 1,
  }, g);

  // Header bar
  el('rect', {
    x: ent.x, y: ent.y, width, height: headerH, rx: radius,
    fill: '#2a2c3a',
  }, g);
  // Clip bottom corners of header
  el('rect', {
    x: ent.x, y: ent.y + headerH - radius, width, height: radius,
    fill: '#2a2c3a',
  }, g);

  textEl(ent.x + 10, ent.y + 19, ent.id, {
    fill: '#fff', 'font-size': 13, 'font-weight': 600,
  }, g);

  // Fields
  ent.fields.forEach((f, i) => {
    const fy = ent.y + headerH + i * rowH + 14;
    let label = '';
    if (f.type === 'PK') label = '🔑 ';
    else if (f.type === 'FK') label = '🔗 ';
    else if (f.type === '★') label = '★ ';
    else if (f.type === 'JSON') label = '{ } ';

    textEl(ent.x + 10, fy, label + f.name, {
      fill: f.type === '★' ? '#ffdb4a' : f.type === 'FK' ? '#8ab4f8' : '#ccc',
      'font-size': 11,
    }, g);

    if (f.comment) {
      textEl(ent.x + 160, fy, f.comment, {
        fill: '#777', 'font-size': 10,
      }, g);
    }
  });

  entityBounds[ent.id] = {
    x: ent.x, y: ent.y, w: width, h,
    cx: ent.x + width / 2, cy: ent.y + h / 2,
    service: ent.service,
  };
}

// Draw relationships
for (const [fromId, toId, type, label] of RELATIONSHIPS) {
  const a = entityBounds[fromId];
  const b = entityBounds[toId];
  if (!a || !b) continue;

  // Find best connection points (closest edges)
  let x1, y1, x2, y2;
  const dx = b.cx - a.cx;
  const dy = b.cy - a.cy;

  if (Math.abs(dx) > Math.abs(dy)) {
    // Horizontal connection
    if (dx > 0) { x1 = a.x + a.w; x2 = b.x; }
    else { x1 = a.x; x2 = b.x + b.w; }
    y1 = a.cy; y2 = b.cy;
  } else {
    // Vertical connection
    if (dy > 0) { y1 = a.y + a.h; y2 = b.y; }
    else { y1 = a.y; y2 = b.y + b.h; }
    x1 = a.cx; x2 = b.cx;
  }

  const isCross = type === 'cross';
  const g = el('g', { class: 'rel' });

  el('line', {
    x1, y1, x2, y2,
    stroke: isCross ? '#ffdb4a' : '#556',
    'stroke-width': isCross ? 1.5 : 1,
    'stroke-dasharray': isCross ? '6,4' : 'none',
    opacity: isCross ? 0.6 : 0.5,
  }, g);

  if (label) {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    el('rect', {
      x: mx - 50, y: my - 8, width: 100, height: 14, rx: 3,
      fill: '#0f1117', opacity: 0.85,
    }, g);
    textEl(mx, my + 3, label, {
      fill: isCross ? '#ffdb4a' : '#888', 'font-size': 9,
      'text-anchor': 'middle',
    }, g);
  }
}

// ═══════════════════════════════════════════════════════════════
// VIEWBOX-BASED PAN + ZOOM (no CSS transform, no overflow)
// ═══════════════════════════════════════════════════════════════

// Compute content bounds
let contentW = 0, contentH = 0;
for (const svc of SERVICES) {
  contentW = Math.max(contentW, svc.x + svc.width + 60);
  contentH = Math.max(contentH, svc.y + svc.height + 60);
}

// viewBox state: track zoom level + pan offset, derive w/h from screen aspect ratio
const canvas = document.getElementById('canvas');
let zoomLevel = 1; // 1 = fit content width
let vb = { x: 0, y: 0, w: contentW, h: contentH };
let isDragging = false, dragStartX, dragStartY, vbStartX, vbStartY;

function applyViewBox() {
  // Always derive vb.w and vb.h from zoom + screen aspect ratio
  const aspect = canvas.clientWidth / canvas.clientHeight;
  vb.w = contentW / zoomLevel;
  vb.h = vb.w / aspect;
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  document.getElementById('zoom-level').textContent = Math.round(zoomLevel * 100) + '%';
}

window.addEventListener('resize', () => applyViewBox());

// Ctrl+wheel = zoom toward cursor, plain wheel = pan
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (!e.ctrlKey && !e.metaKey) {
    // Normal scroll → pan
    const panSpeed = 1.5;
    vb.x += e.deltaX * (vb.w / canvas.clientWidth) * panSpeed;
    vb.y += e.deltaY * (vb.h / canvas.clientHeight) * panSpeed;
    applyViewBox();
    return;
  }

  const zoomFactor = e.deltaY > 0 ? 0.88 : 1.12;
  const newZoom = zoomLevel * zoomFactor;
  if (newZoom < 0.05 || newZoom > 20) return;

  // Mouse position in SVG coordinates (before zoom)
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * vb.w + vb.x;
  const my = ((e.clientY - rect.top) / rect.height) * vb.h + vb.y;

  // Update zoom
  zoomLevel = newZoom;

  // Recompute vb.w/vb.h from new zoom
  const aspect = canvas.clientWidth / canvas.clientHeight;
  const newW = contentW / zoomLevel;
  const newH = newW / aspect;

  // Adjust pan so mouse point stays fixed
  vb.x = mx - ((e.clientX - rect.left) / rect.width) * newW;
  vb.y = my - ((e.clientY - rect.top) / rect.height) * newH;
  vb.w = newW;
  vb.h = newH;

  applyViewBox();
}, { passive: false });

// Drag to pan
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  vbStartX = vb.x;
  vbStartY = vb.y;
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  // Convert pixel drag to SVG coordinate movement
  vb.x = vbStartX - dx * (vb.w / canvas.clientWidth);
  vb.y = vbStartY - dy * (vb.h / canvas.clientHeight);
  applyViewBox();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.classList.remove('dragging');
});

// Touch: single finger pan, pinch zoom
let lastTouchDist = 0;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    vbStartX = vb.x;
    vbStartY = vb.y;
  } else if (e.touches.length === 2) {
    isDragging = false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - dragStartX;
    const dy = e.touches[0].clientY - dragStartY;
    vb.x = vbStartX - dx * (vb.w / canvas.clientWidth);
    vb.y = vbStartY - dy * (vb.h / canvas.clientHeight);
    applyViewBox();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = dist / lastTouchDist;
    const newZoom = zoomLevel * factor;
    if (newZoom >= 0.05 && newZoom <= 20) {
      const cx = vb.x + vb.w / 2;
      const cy = vb.y + vb.h / 2;
      zoomLevel = newZoom;
      const aspect = canvas.clientWidth / canvas.clientHeight;
      vb.w = contentW / zoomLevel;
      vb.h = vb.w / aspect;
      vb.x = cx - vb.w / 2;
      vb.y = cy - vb.h / 2;
      applyViewBox();
    }
    lastTouchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { isDragging = false; });

// Button controls
window.zoomIn = () => {
  const cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
  zoomLevel = Math.min(20, zoomLevel * 1.25);
  const aspect = canvas.clientWidth / canvas.clientHeight;
  vb.w = contentW / zoomLevel;
  vb.h = vb.w / aspect;
  vb.x = cx - vb.w / 2; vb.y = cy - vb.h / 2;
  applyViewBox();
};
window.zoomOut = () => {
  const cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
  zoomLevel = Math.max(0.05, zoomLevel * 0.8);
  const aspect = canvas.clientWidth / canvas.clientHeight;
  vb.w = contentW / zoomLevel;
  vb.h = vb.w / aspect;
  vb.x = cx - vb.w / 2; vb.y = cy - vb.h / 2;
  applyViewBox();
};
window.resetView = () => {
  zoomLevel = 1;
  vb.x = 0; vb.y = 0;
  applyViewBox();
};
window.fitToScreen = () => {
  const aspect = canvas.clientWidth / canvas.clientHeight;
  const contentAspect = contentW / contentH;
  // Fit so entire content is visible
  if (contentAspect > aspect) {
    // Content is wider than screen — fit width
    zoomLevel = 0.95;
  } else {
    // Content is taller — fit height
    zoomLevel = (contentW / (contentH * aspect)) * 0.95;
  }
  const newW = contentW / zoomLevel;
  const newH = newW / aspect;
  vb.x = (contentW - newW) / 2;
  vb.y = (contentH - newH) / 2;
  vb.w = newW;
  vb.h = newH;
  applyViewBox();
};

fitToScreen();
</script>
</body>
</html>
