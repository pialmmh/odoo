# =============================================================================
# DEV profile — local development on this machine.
# Activated by `spring.profiles.active: dev` in application.yml.
# =============================================================================

integrations:
  crm:
    enabled: true

    # Multi-tenant bootstrap.php in espocrm resolves tenant from the HTTP
    # Host header. A Host of "127.0.0.1:7082" would match '127' as the
    # tenant slug (regex ^([a-z0-9_-]+)\.) and 404. Plain 'localhost' →
    # slug=master → the control DB (has no user/entity data). To hit a
    # real tenant, put the slug in the hostname:
    base-url: http://btcl.localhost:7080

    # Admin Basic auth — the working path for User/Role/Team/Settings and
    # other admin-scope endpoints. EspoCRM's X-Api-Key only accepts
    # type=api users, which fail the $user->isAdmin() gate.
    # Obtain via:
    #   espocrm/tools/deploy/post_install_scripts/enable_api_permission.sh
    admin-user:     admin
    admin-password: admin

    # X-Api-Key fallback — only used when admin-user is blank.
    api-key: ''

# LiveKit — meeting JWT minting + (later) recording control.
# Shared deployment: btcl SFU, fronted by nginx on sbc1.
# Keys from: routesphere/webrtc/docs/livekit-installation-info.md §2
