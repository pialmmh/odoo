server:
  port: 8180

erp:
  # ── Legacy `provider` — read by the old ErpClient pattern in
  #    com.telcobright.api.erp.* (tax-rate slice, Odoo proxy). Coexists
  #    with the new `backend` below; will be unified later.
  provider: odoo
  # ── New `backend` — selects the active ErpAdapter implementation
  #    in com.telcobright.api.erpv2.*. Wires IdempiereErpAdapter for
  #    /api/erp-v2/** when set to `idempiere`.
  backend: idempiere
  odoo:
    url: http://127.0.0.1:7169
    db: odoo_billing
    username: admin
    password: admin
  idempiere:
    # iDempiere Postgres — read by the grandfathered IdempiereProductService
    # (direct JDBC). New BFF endpoints replace this in slice 2.
    jdbcUrl: jdbc:postgresql://127.0.0.1:5433/idempiere
    username: adempiere
    password: adempiere
    schema: adempiere
    clientId: 0       # GardenWorld is client 11; 0 = system. Filter applied at query.
    clientIds: 0,11   # comma-separated allowed clients (system + GardenWorld for dev)
    # iDempiere-embedded BFF (erp-api WAB at :7079/erp-api).
    bffUrl: http://127.0.0.1:7079/erp-api

killbill:
  url: http://127.0.0.1:18080
  username: admin
  password: password

# ── Environment-specific config (CRM integration, etc.) lives in
#    application-<profile>.yml files. Select the profile below.
#    Shipped profiles: mustafa | dev | staging | prod.
# ── Multi-tenant bootstrap ──
# Enable tenants and select which profile to load for each.
# Profile files live at: config/tenants/{name}/{profile}/profile-{profile}.yml
orchestrix:
  # Operator owning this deployment. One deployment = one operator.
  # Tenants listed below are clients of this operator.
  operator: telcobright
  tenants:
    - name: telcobright
      enabled: true
      profile: dev
    - name: btcl
      enabled: true
      profile: dev

spring:
  application:
    name: platform-api
  profiles:
    # Hardcoded here to avoid env-var surprises. To change env, edit this line
    # (or create application-<profile>.yml).
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:7104/realms/telcobright
