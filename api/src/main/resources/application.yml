server:
  port: 8180

odoo:
  url: http://127.0.0.1:7169
  db: odoo_billing
  username: admin
  password: admin

killbill:
  url: http://127.0.0.1:18080
  username: admin
  password: password

# ── Environment-specific config (CRM integration, etc.) lives in
#    application-<profile>.yml files. Select the profile below.
#    Shipped profiles: mustafa | dev | staging | prod.
# ── Multi-tenant bootstrap ──
# Enable tenants and select which profile to load for each.
# Profile files live at: config/tenants/{name}/{profile}/profile-{profile}.yml
orchestrix:
  # Operator owning this deployment. One deployment = one operator.
  # Tenants listed below are clients of this operator.
  operator: telcobright
  tenants:
    - name: telcobright
      enabled: true
      profile: dev
    - name: btcl
      enabled: true
      profile: dev

spring:
  application:
    name: platform-api
  profiles:
    # Hardcoded here to avoid env-var surprises. To change env, edit this line
    # (or create application-<profile>.yml).
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:7104/realms/telcobright
